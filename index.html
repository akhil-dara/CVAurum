    <meta charset="UTF-8" />

         up for the search-result icon; SVG + PNG cover modern browsers. -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- FAQ rich result — mirrors the visible FAQ on the homepage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I know my data is really private?",
          "acceptedAnswer": { "@type": "Answer", "text": "Because you can check. CVAurum runs entirely in your browser — your resume is stored locally and never sent anywhere. There's no account, no server, and no analytics. Open your browser's network tab and you'll see zero outbound requests, even for fonts, which we self-host." }
        },
        {
          "@type": "Question",
          "name": "If it's free and open source, what's the catch?",
          "acceptedAnswer": { "@type": "Answer", "text": "There isn't one. CVAurum is MIT-licensed and the full source is on GitHub. There's no paid tier, no export paywall, and no data to monetize because we never collect any. Fork it, self-host it, or run it offline forever." }
        },
        {
          "@type": "Question",
          "name": "Is the ATS score real, or AI guesswork?",
          "acceptedAnswer": { "@type": "Answer", "text": "It's deterministic, not a guess. The same resume and job description always produce the same score, and it shows exactly which keywords matched and which are missing — so you can fix your resume with confidence." }
        },
        {
          "@type": "Question",
          "name": "Where is my data stored?",
          "acceptedAnswer": { "@type": "Answer", "text": "Only in your browser, using local storage. Nothing is sent anywhere. Clear your browser data and it's gone — so use Backup to keep a copy." }
        },
        {
          "@type": "Question",
          "name": "Will my résumé pass ATS scans?",
          "acceptedAnswer": { "@type": "Answer", "text": "The exported PDF and Word files use real, selectable text (not an image), and there's a built-in ATS check that scores structure and keyword coverage against a job description." }
        },
        {
          "@type": "Question",
          "name": "Can I move my résumé to another computer?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Export a full backup (one file) or a single JSON Resume file, then import it in any browser." }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. There's no sign-up, no email, and no login — open CVAurum and start editing immediately. Most builders make you register before you can even see the editor; CVAurum never does." }
        },
        {
          "@type": "Question",
          "name": "What's the difference between a CV and a resume?",
          "acceptedAnswer": { "@type": "Answer", "text": "A resume is a concise, one-to-two page summary tailored to a specific job (common in the US). A CV is a longer, comprehensive record of your academic and professional history (standard in academia and much of Europe). CVAurum builds both — pick a compact template for a resume, or add sections for a full CV." }
        },
        {
          "@type": "Question",
          "name": "What file formats can I download?",
          "acceptedAnswer": { "@type": "Answer", "text": "A crisp vector PDF with real, selectable text; an editable Word (.docx) that mirrors your template; and the open JSON Resume format. Every export is free and unlimited — no paywall, no watermark." }
        },
        {
          "@type": "Question",
          "name": "How long should my resume be?",
          "acceptedAnswer": { "@type": "Answer", "text": "For most roles, one page — two if you have 10+ years of experience. CVAurum auto-fits your content to a single page when it's close, and shows live page-break guides so you always know where you stand." }
        }
      ]
    }
    </script>

  <body class="h-full bg-background text-foreground antialiased">
    <div id="root" class="h-full"></div>
    <noscript>
      <main style="max-width:760px;margin:0 auto;padding:48px 20px;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;line-height:1.6">
        <h1>CVAurum — the free, open-source resume builder that runs entirely in your browser</h1>
        <p>CVAurum is a 100% client-side resume studio. Build a beautiful, ATS-ready resume with live WYSIWYG editing, score it against any job description, and export a crisp vector PDF, a WYSIWYG Word document, or JSON Resume — all without an account, a server, or a single tracking pixel. Your data never leaves your device. Free, forever, and MIT-licensed open source.</p>
        <h2>100% private and local-first</h2>
        <p>No account, no sign-up, no server, no analytics. Every resume lives in your browser's storage on your own machine. Back up and restore your whole library to a single file whenever you like.</p>
        <h2>38 premium, data-driven templates</h2>
        <p>Choose from 38 professionally designed templates and edit directly on the page — what you see is exactly what you export.</p>
        <h2>Import your existing PDF résumé</h2>
        <p>Already have a resume? Drop in the PDF and CVAurum rebuilds it into editable sections right in your browser — nothing is uploaded. Scanned or image-only PDFs are read with on-device OCR.</p>
        <h2>Built-in ATS score and keyword matching</h2>
        <p>A deterministic, on-device ATS checker scores your resume and matches it against the keywords in any job description, so you can tailor every application with confidence.</p>
        <h2>Crisp exports: PDF, Word, and JSON Resume</h2>
        <p>Export a vector PDF with selectable text, a WYSIWYG Word (.docx) that mirrors the design, or the open JSON Resume format.</p>
        <h2>True offline with self-hosted fonts</h2>
        <p>All fonts are self-hosted, so CVAurum makes zero external network requests and works fully offline as an installable app.</p>
        <p>CVAurum is MIT-licensed open source — view the code at <a href="https://github.com/akhil-dara/cvaurum">github.com/akhil-dara/cvaurum</a>. This app requires JavaScript; please enable it to start building.</p>
      </main>
    </noscript>
