<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO. Canonical host is https://cvaurum.com (custom domain on
         Cloudflare Pages). If the domain changes, update it in index.html,
         public/robots.txt and public/sitemap.xml. -->
    <title>Free Open-Source ATS Resume Builder — CVAurum</title>
    <meta name="description" content="Build ATS-ready resumes free & private in your browser. Open-source, offline, no sign-up. 30 templates, PDF/Word/JSON export. Your data never leaves your device." />
    <meta name="keywords" content="free resume builder, open source resume builder, private resume builder, offline resume builder, ATS resume builder, resume builder no sign up, local resume builder, JSON Resume" />
    <meta name="author" content="Akhil Dara" />
    <meta name="application-name" content="CVAurum" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://cvaurum.com/" />

    <!-- Open Graph (link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Free Open-Source ATS Resume Builder — CVAurum" />
    <meta property="og:description" content="Build ATS-ready resumes free & private in your browser. Open-source, offline, no sign-up. 30 templates, PDF/Word/JSON export. Your data never leaves your device." />
    <meta property="og:url" content="https://cvaurum.com/" />
    <meta property="og:image" content="https://cvaurum.com/og.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CVAurum" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Open-Source ATS Resume Builder — CVAurum" />
    <meta name="twitter:description" content="Build ATS-ready resumes free & private in your browser. Open-source, offline, no sign-up. 30 templates, PDF/Word/JSON export. Your data never leaves your device." />
    <meta name="twitter:image" content="https://cvaurum.com/og.svg" />

    <!-- Structured data: rich result for the app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CVAurum",
      "description": "CVAurum is a 100% client-side, open-source, privacy-first resume builder. Build ATS-ready resumes entirely in your browser with no server, no account, and no tracking. Includes 30 premium data-driven templates, a deterministic ATS score, job-description keyword matching, and exports to crisp vector PDF, WYSIWYG Word, and JSON Resume.",
      "url": "https://cvaurum.com/",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "browserRequirements": "Requires JavaScript. Works fully offline.",
      "image": "https://cvaurum.com/og.svg",
      "license": "https://opensource.org/licenses/MIT",
      "isAccessibleForFree": true,
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Person", "name": "Akhil Dara" },
      "codeRepository": "https://github.com/akhil-dara/cvaurum",
      "featureList": [
        "100% client-side — no server, no account, no tracking",
        "Privacy-first: all data stored locally in your browser",
        "30 premium data-driven resume templates",
        "Built-in deterministic ATS score",
        "Job-description keyword matching",
        "Export to crisp vector PDF with selectable text",
        "Export to WYSIWYG Word (.docx)",
        "Export to JSON Resume",
        "Self-hosts all fonts — zero external network requests, true offline use",
        "Full local backup and restore to a single file",
        "Inline WYSIWYG canvas editing",
        "Open source (MIT) — free forever"
      ]
    }
    </script>
  </head>
  <body class="h-full bg-background text-foreground antialiased">
    <div id="root" class="h-full"></div>
    <noscript>
      <main style="max-width:760px;margin:0 auto;padding:48px 20px;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;line-height:1.6">
        <h1>CVAurum — the free, open-source resume builder that runs entirely in your browser</h1>
        <p>CVAurum is a 100% client-side resume studio. Build a beautiful, ATS-ready resume with live WYSIWYG editing, score it against any job description, and export a crisp vector PDF, a WYSIWYG Word document, or JSON Resume — all without an account, a server, or a single tracking pixel. Your data never leaves your device. Free, forever, and MIT-licensed open source.</p>
        <h2>100% private and local-first</h2>
        <p>No account, no sign-up, no server, no analytics. Every resume lives in your browser's storage on your own machine. Back up and restore your whole library to a single file whenever you like.</p>
        <h2>30 premium, data-driven templates</h2>
        <p>Choose from 30 professionally designed templates and edit directly on the page — what you see is exactly what you export.</p>
        <h2>Built-in ATS score and keyword matching</h2>
        <p>A deterministic, on-device ATS checker scores your resume and matches it against the keywords in any job description, so you can tailor every application with confidence.</p>
        <h2>Crisp exports: PDF, Word, and JSON Resume</h2>
        <p>Export a vector PDF with selectable text, a WYSIWYG Word (.docx) that mirrors the design, or the open JSON Resume format.</p>
        <h2>True offline with self-hosted fonts</h2>
        <p>All fonts are self-hosted, so CVAurum makes zero external network requests and works fully offline as an installable app.</p>
        <p>CVAurum is MIT-licensed open source — view the code at <a href="https://github.com/akhil-dara/cvaurum">github.com/akhil-dara/cvaurum</a>. This app requires JavaScript; please enable it to start building.</p>
      </main>
    </noscript>
    <!-- Boot splash, replaced once React mounts -->
    <div id="boot-splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d12;color:#e6e8ee;font-family:Inter,system-ui,sans-serif;z-index:9999">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <svg width="60" height="60" viewBox="0 0 64 64" style="filter:drop-shadow(0 8px 30px rgba(214,166,46,.45));animation:bootpulse 1.6s ease-in-out infinite" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bootg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#8a5a12" />
              <stop offset="0.5" stop-color="#d4982f" />
              <stop offset="1" stop-color="#f7d774" />
            </linearGradient>
          </defs>
          <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bootg)" />
          <path d="M18 46 32 16l14 30" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M23.5 35.5h17" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" />
        </svg>
        <div style="font-size:14px;letter-spacing:.04em;opacity:.7">Loading CVAurum…</div>
      </div>
      <style>@keyframes bootpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.96)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
